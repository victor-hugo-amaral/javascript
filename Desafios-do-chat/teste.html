<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Ímpar ou Par</title>
</head>

<body>
    <h1>Desafio Ímpar ou Par</h1>
    <p>Digite um número: <input type="number" id="numero"></p>
    <button onclick="resolver()">Verificar</button>
    <div id="res"></div>

    <script>
        function resolver() {
            let numero = Number(document.getElementById('numero').value.trim());
            let res = document.getElementById('res');

            if (document.getElementById('numero').value.trim() === "") {
                res.innerHTML = '<p>Por favor, <strong>digite um número</strong>.</p>';
                return;
            }

            if (isNaN(numero)) {
                res.innerHTML = '<p>Por favor, <strong>digite um número válido</strong>.</p>';
                return;
            }

            if (numero % 2 === 0) {
                res.innerHTML = '<p>O número <strong>' + numero + '</strong> é <strong>PAR</strong>.</p>';
            } else {
                res.innerHTML = '<p>O número <strong>' + numero + '</strong> é <strong>ÍMPAR</strong>.</p>';
            }
        }
    </script>
</body>

</html>
