        <div>

                <input type="radio" name="aventura" id="montanha">

                <input type="radio" name="aventura" id="florestas">
                <label for="florestas">Florestas</label>

            <button id="geral">Geral perfil</button>
        </div>
        <div id="res">resultado</div>
