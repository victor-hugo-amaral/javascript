<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Jogo da Adivinhação</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background-color: #f0f0f0;
            text-align: center;
        }

        .caixa {
            background: white;
            padding: 20px;
            max-width: 400px;
            margin: auto;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        input,
        button {
            font-size: 16px;
            padding: 8px;
            margin-top: 10px;
        }

        #mensagem {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="caixa">
        <h2>🎯 Adivinhe o número entre 1 e 10</h2>
        <input type="number" id="palpite" placeholder="Digite seu palpite">
        <br>
        <button onclick="verificar()">Tentar</button>
        <div id="mensagem"></div>
    </div>

    <script>
        const numeroSecreto = Math.floor(Math.random() * 10) + 1
        let tentativas = 0
        let maxTentativas = 3

        function verificar() {
            const input = document.getElementById("palpite")
            const mensagem = document.getElementById("mensagem")
            let valor = Number(input.value)

            if (valor < 1 || valor > 10 || isNaN(valor)) {
                mensagem.innerHTML = "⚠️ Digite um número entre 1 e 10."
                return
            }

            tentativas++

            if (valor === numeroSecreto) {
                mensagem.innerHTML = `🎉 Parabéns! Você acertou o número ${numeroSecreto} com ${tentativas} tentativa(s)!`
                input.disabled = true
            } else if (tentativas >= maxTentativas) {
                mensagem.innerHTML = `😢 Acabaram as tentativas! O número era ${numeroSecreto}.`
                input.disabled = true
            } else {
                mensagem.innerHTML = valor < numeroSecreto ? "🔺 É maior!" : "🔻 É menor!"
            }

            input.value = ""
            input.focus()
        }
    </script>
</body>

</html>
