<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 01</title>
    <style>
        button {
            font-size: 30px;
        }
    </style>
</head>

<body>
    <button onclick="alerta(1)">Botão 1°</button>
    <button onclick="alerta(2)">Botão 2°</button>
    <button onclick="alerta(3)">Botão 3°</button>

    <script>
        function alerta(numero) {
            alert('Voce apertou botão ' + numero + ' °')
        }
    </script>
</body>


</html>
