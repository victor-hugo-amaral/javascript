<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 02</title>
</head>

<body>
    <p id="texto">Clique em um botão para ver uma mensagem!.</p>
    <button onclick="mudartexto('texto')">Bom dia!</button>
    <button onclick="mudartexto('texto')">Boa tarde!</button>
    <button onclick="mudartexto('texto')">Boa noite!</button>

    <script>
        function mudartexto(texto) {
            document.getElementById("texto").innerText = mudartexto
        }
    </script>
</body>

</html>
