<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condições</title>
</head>

<body>
    <h1>Sistema de multas</h1>
    Velocidade do carro <input type="number" id="txtvel"> km/h<br>
    <button onclick="calcular()" value="verificar">Calcular o valor</button>
    <div id="res"></div>
    <script>
        function calcular() {
            let txtvel = document.getElementById('txtvel')
            let res = document.getElementById('res')
            let vel = Number(txtvel.value)
            res.innerHTML = `<p>Sua velocidade atual é de <strong>${vel}km/h </strong></p>`
            if (vel > 60) {
                res.innerHTML += '<p>Você esta <strong>MULTADO</strong> por exesso de velocidade!</p>'
            } else {
                res.innerHTML += '<p>Continui assim!</p>'
            }
            res.innerHTML += '<p>Dirija sempre com cinto de segurança!</p>'

        }
    </script>
</body>

</html>
