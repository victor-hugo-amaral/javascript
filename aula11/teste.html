<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio chat</title>
</head>

<body>
    <h1>Qual é a sua nacionalidade?</h1>
    <p>Digite o seu país: <input type="text" id="txtpais"></p>
    <button onclick="verificar()">Verificar</button>
    <div id="res"></div>

    <script>
        function verificar() {
            let txtpais = document.getElementById('txtpais').value.trim().toLowerCase();
            let res = document.getElementById('res');

            if (txtpais === 'brasil') {
                res.innerHTML = '<p>Você é <strong>brasileiro</strong></p>';
            } else if (txtpais !== '') {
                res.innerHTML = '<p>Você é <strong>estrangeiro</strong></p>';
            } else {
                res.innerHTML = '<p>Por favor, digite um país válido.</p>';
            }
        }
    </script>
</body>

</html>
